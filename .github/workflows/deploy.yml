name: Deploy Hugo site to GitHub Pages

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

env:
  HUGO_VERSION: 0.161.1
  TZ: Asia/Tokyo
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          submodules: recursive
          fetch-depth: 0

      - name: Setup Hugo
        uses: peaceiris/actions-hugo@v3
        with:
          hugo-version: ${{ env.HUGO_VERSION }}
          extended: true

      - name: Setup Pages
        uses: actions/configure-pages@v6

      - name: Show repository structure
        run: |
          pwd
          ls -la
          echo "---- config check ----"
          find . -maxdepth 3 -type f \( -name "hugo.toml" -o -name "config.toml" -o -name "config.yaml" -o -name "config.yml" \)
          echo "---- themes check ----"
          find . -maxdepth 5 -type d -name "themes" | head -10

      - name: Detect Hugo project directory
        id: detect
        run: |
          # 检查根目录是否有config
          if [ -f "hugo.toml" ] || [ -f "config.toml" ] || [ -d "config" ]; then
            echo "BUILD_DIR=." >> "$GITHUB_OUTPUT"
            echo "Found Hugo config in root directory"
          # 检查hugo-teek-site目录
          elif [ -f "hugo-teek-site/hugo.toml" ] || [ -f "hugo-teek-site/config.toml" ] || [ -d "hugo-teek-site/config" ]; then
            echo "BUILD_DIR=hugo-teek-site" >> "$GITHUB_OUTPUT"
            echo "Found Hugo config in hugo-teek-site directory"
          # 检查themes/hugo-teek/hugo-teek-site目录
          elif [ -f "themes/hugo-teek/hugo-teek-site/hugo.toml" ]; then
            echo "BUILD_DIR=themes/hugo-teek/hugo-teek-site" >> "$GITHUB_OUTPUT"
            echo "Found Hugo config in themes/hugo-teek/hugo-teek-site directory"
          else
            echo "No Hugo config found."
            echo "Current files:"
            find . -maxdepth 3 -type f | sort
            exit 1
          fi

      - name: Prepare Hugo theme
        run: |
          BUILD_DIR="${{ steps.detect.outputs.BUILD_DIR }}"
          echo "Build directory: $BUILD_DIR"
          
          # 如果BUILD_DIR是根目录，需要准备主题
          if [ "$BUILD_DIR" = "." ]; then
            echo "Preparing theme for root directory..."
            # 检查主题是否在子模块的子目录中
            if [ -d "themes/hugo-teek/hugo-teek-site/themes/hugo-teek" ] && [ ! -d "themes/hugo-teek/archetypes" ]; then
              echo "Moving theme files from submodule subdirectory..."
              # 复制真正的主题文件到临时目录
              cp -r themes/hugo-teek/hugo-teek-site/themes/hugo-teek /tmp/hugo-teek-theme
              # 清空 themes/hugo-teek 目录（保留 .git）
              find themes/hugo-teek -mindepth 1 -maxdepth 1 ! -name '.git' -exec rm -rf {} +
              # 复制主题文件
              cp -r /tmp/hugo-teek-theme/* themes/hugo-teek/
              cp /tmp/hugo-teek-theme/.gitignore themes/hugo-teek/ 2>/dev/null || true
            fi
          # 如果BUILD_DIR是themes/hugo-teek/hugo-teek-site，需要准备主题
          elif [ "$BUILD_DIR" = "themes/hugo-teek/hugo-teek-site" ]; then
            echo "Preparing theme for hugo-teek-site..."
            # 确保themes目录存在
            mkdir -p "$BUILD_DIR/themes"
            # 如果hugo-teek主题不在正确位置，复制它
            if [ ! -d "$BUILD_DIR/themes/hugo-teek" ]; then
              cp -r "themes/hugo-teek/hugo-teek-site/themes/hugo-teek" "$BUILD_DIR/themes/"
            fi
          fi

      - name: Build Hugo site
        run: |
          cd "${{ steps.detect.outputs.BUILD_DIR }}"
          hugo version
          hugo --gc --minify --baseURL "https://mu8429.github.io/"

      - name: Check public directory
        run: |
          cd "${{ steps.detect.outputs.BUILD_DIR }}"
          if [ ! -d "public" ]; then
            echo "public directory not found."
            ls -la
            exit 1
          fi
          echo "public directory exists."
          ls -la public

      - name: Upload GitHub Pages artifact
        uses: actions/upload-pages-artifact@v5
        with:
          path: ${{ steps.detect.outputs.BUILD_DIR }}/public

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    runs-on: ubuntu-latest
    needs: build

    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
