name: Deploy Hugo site to GitHub Pages

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

env:
  HUGO_VERSION: 0.161.1
  TZ: Asia/Tokyo
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          submodules: recursive
          fetch-depth: 0

      - name: Setup Hugo
        uses: peaceiris/actions-hugo@v3
        with:
          hugo-version: ${{ env.HUGO_VERSION }}
          extended: true

      - name: Setup Pages
        uses: actions/configure-pages@v6

      - name: Show repository structure
        run: |
          pwd
          ls -la
          echo "---- config check ----"
          find . -maxdepth 3 -type f \( -name "hugo.toml" -o -name "config.toml" -o -name "config.yaml" -o -name "config.yml" \)

      - name: Detect Hugo project directory
        id: detect
        run: |
          if [ -f "hugo.toml" ] || [ -f "config.toml" ] || [ -d "config" ]; then
            echo "BUILD_DIR=." >> "$GITHUB_OUTPUT"
          elif [ -f "hugo-teek-site/hugo.toml" ] || [ -f "hugo-teek-site/config.toml" ] || [ -d "hugo-teek-site/config" ]; then
            echo "BUILD_DIR=hugo-teek-site" >> "$GITHUB_OUTPUT"
          else
            echo "No Hugo config found."
            echo "Current files:"
            find . -maxdepth 3 -type f | sort
            exit 1
          fi

      - name: Build Hugo site
        run: |
          cd "${{ steps.detect.outputs.BUILD_DIR }}"
          hugo version
          hugo --gc --minify --baseURL "https://mu8429.github.io/"

      - name: Check public directory
        run: |
          cd "${{ steps.detect.outputs.BUILD_DIR }}"
          if [ ! -d "public" ]; then
            echo "public directory not found."
            ls -la
            exit 1
          fi
          echo "public directory exists."
          ls -la public

      - name: Upload GitHub Pages artifact
        uses: actions/upload-pages-artifact@v5
        with:
          path: ${{ steps.detect.outputs.BUILD_DIR }}/public

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    runs-on: ubuntu-latest
    needs: build

    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
