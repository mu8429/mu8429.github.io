  page = ["HTML"]
  section = ["HTML", "RSS"]

[pagination]
  defaultContentLanguage = "zh-cn"
  pagerSize = 12.0
  path = "page"

[params]
  description = "mu8429 的技术博客，专注于 Java 后端、Spring Boot、数据库、AI 工具等技术分享"
  keywords = ["Java", "Spring Boot", "MySQL", "Redis", "AI", "技术博客"]
  layoutMode = "bothWidthAdjustable"
  siteStartDate = "2026-06-12"

  # 首页分页配置
  [params.homepage]
    paginatePCSize = 12
    mobileInitialShow = 3
    mobileLoadMoreStep = 10

  # Section URL 映射配置
  [params.sectionMapping]
    "01.Java" = "/java/"
    "02.SpringBoot" = "/springboot/"
    "03.数据库" = "/database/"
    "04.AI工具" = "/ai-tools/"
    "05.面试" = "/interview/"
    "06.项目" = "/projects/"
    "07.笔记" = "/notes/"
    "08.博客" = "/blog/"

  # 分析统计配置
  [params.analytics]
    [params.analytics.busuanzi]
      enabled = false
      url = ""
      prefix = "busuanzi"
      style = "comma"
      pjax = false
      page_pv = true
      site_pv = true
      site_uv = true
    [params.analytics.umami]
      enabled = false
      url = ""
      websiteId = ""

  # 打赏配置
  [params.appreciation]
    enabled = false
    alipayQR = ""
    wechatQR = ""

  # 微信公众号卡片
  [params.wechatOfficial]
    enabled = false
    name = ""
    description = ""
    qrcodeImage = ""
    qrcodeUrl = ""

  # 作者信息
  [params.author]
    email = ""
    link = "https://github.com/mu8429"
    name = "mu8429"

  # 博主信息卡
  [params.blogger]
    avatar = "/images/avatar.svg"
    backgroundImage = ""
    circleBgImg = ""
    circleBgMask = false
    name = "mu8429"
    shape = "circle-rotate"
    slogan = "记录技术学习与成长"
    [params.blogger.status]
      icon = "💻"
      size = 18.0
      title = "编码中"

  # 首页侧边栏卡片显示控制
  [params.homeSidebar]
    [params.homeSidebar.announcement]
      enabled = true
    [params.homeSidebar.calendar]
      enabled = true
    [params.homeSidebar.timeProgress]
      enabled = true
    [params.homeSidebar.recentComments]
      enabled = false
      pageSize = 5
      totalSize = 50
    [params.homeSidebar.featuredPosts]
      enabled = true
    [params.homeSidebar.categories]
      enabled = true
    [params.homeSidebar.hotTags]
      enabled = true
    [params.homeSidebar.friendLinks]
      enabled = false
    [params.homeSidebar.siteInfo]
      enabled = true

  [params.category]
    autoPage = false
    enabled = true
    limit = 8.0
    pageSpeed = 4000.0

  [params.codeBlock]
    autoCollapse = true
    collapseHeight = 700.0
    copyButton = true

  # 评论配置
  [params.comment]
    enabled = false
    envId = ""
    hideAdmin = false
    provider = "twikoo"
    version = "1.6.41"

  # 文章版权信息
  [params.docCopyright]
    authorName = "mu8429"
    authorUrl = "https://github.com/mu8429"
    enabled = true
    licenseName = "CC BY-NC-SA 4.0"
    licenseUrl = "https://creativecommons.org/licenses/by-nc-sa/4.0/deed.zh"
    siteName = "mu8429 Blog"
    siteUrl = "https://mu8429.github.io"

  # 页脚配置
  [params.footer]
    copyright_suffix = "mu8429"
    copyright_year_start = 2026.06
    custom_message = "Stay hungry, stay foolish"
    show_services = true
    show_theme_info = true
    [params.footer.icp]
      enabled = false
      number = ""
      url = ""

  # 动态背景配置
  [params.heroBg]
    enabled = true
    autoPlay = true
    interval = 8000
    mode = "hybrid"
    useStaticFirst = true
    apiUrl = ""
    apiEnabled = false
    apiCacheDuration = 3600
    [params.heroBg.performance]
      preloadCount = 3
      lazyLoadDelay = 500
      predictivePreload = true
      pauseOnHidden = true
    [params.heroBg.quality]
      format = "webp"
      fallbackFormat = "jpg"
      [params.heroBg.quality.mobile]
        width = 1080
        height = 720
        quality = 75
      [params.heroBg.quality.desktop]
        width = 1920
        height = 1080
        quality = 85

  # 打字机副标题配置
  [params.heroSubtitle]
    deleteSpeed = 45.0
    hold = 1800.0
    nextDelay = 600.0
    shuffle = false
    typeSpeed = 90.0

  [params.image]
    lazyLoading = true

  # 缩略图配置
  [params.imageThumbnail]
    enabled = false
    [params.imageThumbnail.articleCard]
      width = 1200
      height = 690
      quality = 80
      format = "webp"

  [params.layoutWidths]
    description = "mu8429 的技术博客"
    doc = "960px"
    full = "1440px"
    keywords = ["Java", "Spring Boot", "AI", "技术博客"]
    mainSections = ["docs"]
    page = "1280px"

  [params.scrollProgress]
    enabled = true

  [params.search]
    enabled = true
    provider = "pagefind"

  # 友链配置
  [params.friendLink]
    limit = 5
    interval = 5000
    groups = []

  [params.friendPage]
    smallTitle = "与各位博主一起成长进步"
    bannerButtonGroup = true

  # 标签页标题切换
  [params.titleChange]
    enabled = true
    hidden = "w(ﾟДﾟ)w 不要走！再看看嘛！"
    resetDelay = 2000.0
    return = "♪(^∇^*)欢迎回来！"

  # 壁纸功能
  [params.wallpaper]
    autoPlay = true
    enabled = true
    hideBanner = true
    interval = 5000.0

  # 页面加载动画
  [params.pageLoading]
    enabled = true
    text = "Loading..."

