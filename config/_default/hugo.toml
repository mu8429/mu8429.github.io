baseURL = "https://mu8429.github.io/"
languageCode = "zh-CN"
defaultContentLanguage = "zh-cn"
title = "mu8429's Blog"
theme = "hugo-theme-stack"
[pagination]
  pagerSize = 10
enableRobotsTXT = true
enableEmoji = true
timeZone = "Asia/Shanghai"

[menu]
  [[menu.main]]
    identifier = "home"
    name = "首页"
    url = "/"
    weight = 1
    pre = "home"

  [[menu.main]]
    identifier = "categories"
    name = "技术分类"
    url = "/categories/"
    weight = 2
    pre = "folder"

  [[menu.main]]
    identifier = "tags"
    name = "标签"
    url = "/tags/"
    weight = 3
    pre = "tags"

  [[menu.main]]
    identifier = "archives"
    name = "归档"
    url = "/archives/"
    weight = 4
    pre = "archive"

  [[menu.main]]
    identifier = "projects"
    name = "项目"
    url = "/posts/projects/"
    weight = 5
    pre = "rocket"

  [[menu.main]]
    identifier = "about"
    name = "关于"
    url = "/about/"
    weight = 6
    pre = "user"

  [[menu.main]]
    identifier = "github"
    name = "GitHub"
    url = "https://github.com/mu8429"
    weight = 7
    pre = "github"

[markup]
  [markup.goldmark]
    [markup.goldmark.renderer]
      unsafe = true
  [markup.highlight]
    codeFences = true
    guessSyntax = true
    lineNos = true
    style = "monokai"
  [markup.tableOfContents]
    endLevel = 4
    ordered = false
    startLevel = 2

[outputs]
  home = ["HTML", "RSS", "JSON"]

[taxonomies]
  category = "categories"
  tag = "tags"
  series = "series"

[imaging]
  quality = 75
  resampleFilter = "Lanczos"

[sitemap]
  changefreq = "weekly"
  filename = "sitemap.xml"
  priority = 0.5

[frontmatter]
  date = ["date", "publishDate", "lastmod"]
  lastmod = ["lastmod", ":fileModTime", "date"]
  publishDate = ["publishDate", "date"]

[languages]
  [languages.zh-cn]
    languageName = "简体中文"
    weight = 1
    title = "mu8429's Blog"
    description = "记录 Java 后端、AI 工具、项目开发与学习总结"

    [languages.zh-cn.params]
      categories = "分类"
      tags = "标签"
      archives = "归档"
      search = "搜索"
      searchPlaceholder = "搜索文章..."
      readMore = "阅读更多"
      tableOfContents = "目录"
      lastUpdated = "最后更新"
      previousPost = "上一篇"
      nextPost = "下一篇"
      relatedPosts = "相关文章"
      series = "系列"
      announcement = "公告"
      backToTop = "回到顶部"
      home = "首页"
      about = "关于"
      links = "友链"
      now = "现在"
