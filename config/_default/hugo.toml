baseURL = "https://mu8429.github.io/"
contentDir = "content"
enableEmoji = true
enableGitInfo = true
enableRobotsTXT = true
languageCode = "zh-CN"
publishDir = "public"
theme = "hugo-teek"
title = "mu8429's Blog"

# 启用 HTML/CSS/JS/JSON/XML 最小化
[minify]
  disableCSS = false
  disableHTML = false
  disableJS = false
  disableJSON = false
  disableSVG = false
  disableXML = false
  minifyOutput = true
  [minify.tdewolff.html]
    keepWhitespace = false
  [minify.tdewolff.css]
    keepCSS2 = false
  [minify.tdewolff.js]
    keepVarNames = false

# 忽略以下划线开头的文件和目录（递归），但保留 _index.md
ignoreFiles = [
  "/_[^i].*",
  "/_i[^n].*",
  "/_in[^d].*",
  "/_ind[^e].*",
  "/_inde[^x].*",
  "/_index[^\\.].*",
  "/_index\\.[^m].*",
  "/_index\\.m[^d].*",
  "/_index\\.md..*"
]

# Front Matter 配置 - 最后更新时间使用文件修改时间
[frontmatter]
  lastmod = [":fileModTime", ":default"]

[markup]
  [markup.goldmark]
    [markup.goldmark.extensions]
      attributes = true
      definitionList = true
      footnote = true
      linkify = true
      strikethrough = true
      table = true
      taskList = true
      typographer = true
    [markup.goldmark.parser]
      autoHeadingID = true
      [markup.goldmark.parser.attribute]
        block = true
        title = true
    [markup.goldmark.renderer]
      unsafe = true
  [markup.highlight]
    codeFences = true
    guessSyntax = true
    lineNos = true
    lineNumbersInTable = true
    noClasses = false
    style = "monokai"
    tabWidth = 2.0
  [markup.tableOfContents]
    endLevel = 4.0
    ordered = false
    startLevel = 1.0

