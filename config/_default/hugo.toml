[taxonomies]
  category = "categories"
  tag = "tags"
  series = "series"

[outputs]
  home = ["HTML", "RSS", "JSON"]

[sitemap]
  changefreq = "weekly"
  filename = "sitemap.xml"
  priority = 0.5

[params]
  description = "记录 Java 后端、AI 工具、项目开发与学习总结"
  keywords = ["Java", "Spring Boot", "AI", "博客", "技术"]
  layoutMode = "bothWidthAdjustable"
  siteStartDate = "2026-06-12"

  [params.homepage]
    paginatePCSize = 10
    mobileInitialShow = 3
    mobileLoadMoreStep = 10

  [params.social]
    github = "https://github.com/mu8429"

  [params.article]
    showToc = true
    showReadingTime = true
    showDate = true
    showTags = true
    showCategories = true
    showSeries = true
    showAuthor = true

  [params.search]
    enable = true

  [params.comments]
    enable = false

  [params.analytics]
    enable = false

[languages]
  [languages.zh-cn]
    languageName = "简体中文"
